services:
  # ─────────────────────────────────────────────
  # PicoClaw Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm picooraclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  picooraclaw-agent:
    image: docker.io/sipeed/picooraclaw:latest
    container_name: picooraclaw-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.picooraclaw
    entrypoint: ["picooraclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # PicoClaw Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml up picooraclaw-gateway
  # ─────────────────────────────────────────────
  picooraclaw-gateway:
    image: docker.io/sipeed/picooraclaw:latest
    container_name: picooraclaw-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.picooraclaw
